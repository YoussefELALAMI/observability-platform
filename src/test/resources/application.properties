# Use H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Run schema.sql BEFORE Hibernate initializes
spring.sql.init.mode=always

# Let Hibernate create the schema from your @Entity classes
spring.jpa.hibernate.ddl-auto=create-drop

# Override the default schema to match your entity's @Table(schema=...)
spring.jpa.properties.hibernate.default_schema=observability_schema

# Disable Flyway during tests ? Hibernate creates tables instead
spring.flyway.enabled=false